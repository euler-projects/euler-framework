<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
    <link rel="stylesheet" th:href="@{/assets/euler/security/css/single-form.css}">

    <title th:text="${euler.ctx.__SITE_NAME}">Euler Framework</title>

</head>

<body>
<div class="wrapper">
    <div class="wrapper-inner">
        <div class="title-wrapper">
            <span class="" th:text="${euler.ctx.__SITE_NAME}">Euler Framework</span>
        </div>
        <div class="form-wrapper">
            <form th:action="@{${loginProcessingUrl}}"
                  class="full-line-form"
                  method="post">
                <div class="form-group">
                    <input type="text" name="username" class="form-control" id="username" placeholder="username"
                           th:placeholder="#{_USERNAME}">
                </div>
                <div class="form-group">
                    <input type="password" name="password" class="form-control" id="password" placeholder="password"
                           th:placeholder="#{_PASSWORD}">
                </div><!--/*
                The csrf input will be generated by Thymeleaf automatically
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/> */-->
                <input type="hidden" th:name="${loginSuccessRedirectParameter}" th:if="${param.get(loginSuccessRedirectParameter)}" th:value="${param.get(loginSuccessRedirectParameter)[0]}"/>
                <div class="form-group">
                    <button type="submit" class="btn btn-success" th:text="#{_SIGN_IN}">Sign In</button>
                </div>
            </form>
        </div>
        <div class="info-wrapper" th:if="${param.error} != null">
            <div class="failure-info">Invalid username or password.</div>
        </div>
    </div>
    <footer class="footer-wrapper">
        <span><a href="/static" th:href="@{/}"
                 th:text="${euler.ctx.__SITE_NAME}">Euler Framework</a></span>
        <span>&copy; <span class="js-current-year">2026</span><script>document.querySelector('.js-current-year').textContent = new Date().getFullYear();</script> <a
                href="https://www.eulerproject.io"
                th:href="${euler.ctx.__COPYRIGHT_HOLDER_WEBSITE}"
                th:text="${euler.ctx.__COPYRIGHT_HOLDER}">Euler Project</a></span>
    </footer>
</div>
</body>
</html>
